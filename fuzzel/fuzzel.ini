# fuzzel application launcher — solarized dark (matches the default ghostty theme)
# man 5 fuzzel.ini

[main]
font=UbuntuSansMono Nerd Font:size=14
terminal=ghostty
layer=overlay
prompt="❯ "
width=40
horizontal-pad=20
vertical-pad=12
inner-pad=6
lines=12

[border]
width=2
radius=4

# Solarized dark palette (colors are RRGGBBAA)
#   base03 #002b36  base02 #073642  base01 #586e75  base0 #839496
#   blue   #268bd2  yellow #b58900
[colors]
background=002b36f2
text=839496ff
prompt=586e75ff
placeholder=586e75ff
input=93a1a1ff
match=b58900ff
selection=073642ff
selection-text=93a1a1ff
selection-match=b58900ff
border=268bd2ff
