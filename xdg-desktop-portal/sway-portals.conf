# xdg-desktop-portal backend routing for the sway session.
#
# Matched by xdg-desktop-portal against XDG_CURRENT_DESKTOP (sway:wlroots),
# so this file applies whenever the desktop is "sway".
#
# Route screencast/screenshot to the wlroots backend (the only one that can
# talk to sway); send everything else to the gtk backend. This keeps the
# gnome backend (which targets mutter) out of the screen-sharing path.

[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
